{% extends "base.html" %}
{% block title %}Team Chat{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">💬 Team Chat</h1>
    <p class="page-sub">Group chat — all team members</p>
  </div>
  <div class="online-panel" id="onlinePanel">
    <span class="online-label">🟢 Online:</span>
    <span id="onlineList" class="online-names">Loading…</span>
  </div>
</div>

<!-- CHAT WINDOW -->
<div class="chat-wrap">
  <div class="chat-messages" id="chatMessages">
    <div class="chat-loading">Loading messages…</div>
  </div>

  <!-- INPUT -->
  <div class="chat-input-wrap">
    <input
      type="text"
      id="chatInput"
      class="chat-input"
      placeholder="Type a message…"
      maxlength="1000"
      autocomplete="off"
    />
    <button class="btn btn-chat-send" id="sendBtn" onclick="sendMessage()">
      Send ➤
    </button>
  </div>
</div>

<script>
  const CURRENT_USER = "{{ user_email }}";
  const IS_ADMIN     = {{ 'true' if is_admin else 'false' }};
  let lastMessageIds = new Set();
  let isFirstLoad    = true;

  // ── Fetch & render messages ───────────────────────────────
  function fetchMessages() {
    fetch('/chat/messages')
      .then(r => r.json())
      .then(msgs => {
        const container = document.getElementById('chatMessages');
        const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 60;

        // Find new messages
        const newMsgs = msgs.filter(m => !lastMessageIds.has(m.id));
        if (newMsgs.length === 0 && !isFirstLoad) return;

        // Re-render all messages
        if (msgs.length === 0) {
          container.innerHTML = '<div class="chat-empty">No messages yet. Say hello! 👋</div>';
        } else {
          container.innerHTML = msgs.map(m => renderMessage(m)).join('');
        }

        msgs.forEach(m => lastMessageIds.add(m.id));

        // Scroll to bottom on first load or if user was already at bottom
        if (isFirstLoad || wasAtBottom) {
          container.scrollTop = container.scrollHeight;
        }
        isFirstLoad = false;
      })
      .catch(() => {});
  }

  function renderMessage(m) {
    const isMine   = m.sender === CURRENT_USER;
    const isAdmin  = m.is_admin;
    const time     = m.sent_at ? m.sent_at.slice(0, 19).replace('T', ' ') : '';
    const initials = m.sender ? m.sender.slice(0, 2).toUpperCase() : '??';
    const senderShort = m.sender ? m.sender.split('@')[0] : 'Unknown';

    const deleteBtn = IS_ADMIN
      ? `<button class="chat-delete-btn" onclick="deleteMessage(${m.id})" title="Delete message">🗑️</button>`
      : '';

    const adminTag = isAdmin
      ? `<span class="chat-admin-tag">Admin</span>`
      : '';

    return `
      <div class="chat-msg ${isMine ? 'chat-msg-mine' : 'chat-msg-other'}" data-id="${m.id}">
        ${!isMine ? `<div class="chat-avatar">${initials}</div>` : ''}
        <div class="chat-bubble-wrap">
          ${!isMine ? `<div class="chat-sender">${senderShort} ${adminTag}</div>` : ''}
          <div class="chat-bubble ${isMine ? 'chat-bubble-mine' : ''} ${isAdmin && !isMine ? 'chat-bubble-admin' : ''}">
            <span class="chat-text">${escapeHtml(m.message)}</span>
            ${deleteBtn}
          </div>
          <div class="chat-time ${isMine ? 'chat-time-right' : ''}">${time}</div>
        </div>
        ${isMine ? `<div class="chat-avatar chat-avatar-mine">${initials}</div>` : ''}
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Send message ──────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg   = input.value.trim();
    if (!msg) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    fetch('/chat/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        input.value = '';
        fetchMessages();
      }
    })
    .catch(() => {})
    .finally(() => { btn.disabled = false; });
  }

  // Send on Enter key
  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Delete message (admin) ────────────────────────────────
  function deleteMessage(id) {
    if (!confirm('Delete this message?')) return;
    fetch('/chat/delete/' + id, {method: 'POST'})
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          lastMessageIds.delete(id);
          fetchMessages();
        }
      })
      .catch(() => {});
  }

  // ── Online users ──────────────────────────────────────────
  function fetchOnline() {
    fetch('/chat/online')
      .then(r => r.json())
      .then(users => {
        const el = document.getElementById('onlineList');
        if (!el) return;
        if (users.length === 0) {
          el.textContent = 'None';
        } else {
          el.innerHTML = users.map(u => {
            const short = u.split('@')[0];
            const isMe  = u === CURRENT_USER;
            return `<span class="online-chip ${isMe ? 'online-chip-me' : ''}">${short}${isMe ? ' (you)' : ''}</span>`;
          }).join('');
        }
      })
      .catch(() => {});
  }

  // ── Polling ───────────────────────────────────────────────
  fetchMessages();
  fetchOnline();
  setInterval(fetchMessages, 3000);
  setInterval(fetchOnline,   10000);
</script>

{% endblock %}
